version: '3.8'

services:
  backend:
    image: excalidraw/excalidraw-room:latest
    container_name: excalidraw-board-backend
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=development
      - PORT=3002
    volumes:
      - ./backend/data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3002/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: excalidraw-board-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_WEBSOCKET_URL=ws://localhost:3002
      - VITE_API_URL=http://localhost:3002
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    driver: bridge