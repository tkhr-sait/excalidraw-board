version: '3.8'

services:
  frontend-dev:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_WEBSOCKET_URL=ws://localhost:3002/socket.io/
    # npm installを実行してからdevサーバーを起動
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - excalidraw-room
    networks:
      - excalidraw-network

  excalidraw-room:
    image: excalidraw/excalidraw-room:latest
    ports:
      - "3002:80"
    environment:
      - PORT=80
    networks:
      - excalidraw-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  excalidraw-network:
    driver: bridge